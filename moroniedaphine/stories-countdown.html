<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Stories — Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    position: relative;
    background: #1a0608;
    font-family: 'Inter', sans-serif;
  }
  .bg-photo {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .bg-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 25%;
    filter: brightness(0.22) contrast(1.1);
  }
  .grain {
    position: absolute;
    inset: 0;
    z-index: 1;
    opacity: 0.06;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }
  .vignette {
    position: absolute;
    inset: 0;
    z-index: 2;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(15,3,5,0.7) 100%);
  }
  .content {
    position: relative;
    z-index: 3;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px 80px;
  }

  .top-ornament {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 60px;
  }
  .top-ornament span.line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #D4AF37);
  }
  .top-ornament span.line:last-child {
    background: linear-gradient(90deg, #D4AF37, transparent);
  }
  .top-ornament span.diamond {
    width: 10px;
    height: 10px;
    border: 1px solid #D4AF37;
    transform: rotate(45deg);
    opacity: 0.5;
  }

  .date-label {
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #D4AF37;
    margin-bottom: 48px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.9);
  }

  .names {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 88px;
    font-variation-settings: "opsz" 144, "SOFT" 50, "WONK" 1;
    color: #fff;
    text-align: center;
    line-height: 1.15;
    margin-bottom: 12px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.8), 0 1px 4px rgba(0,0,0,0.5);
  }
  .names i {
    font-style: italic;
    color: #D4AF37;
    opacity: 0.6;
    font-size: 72px;
    margin: 0 16px;
  }

  .gold-divider {
    width: 60px;
    height: 2px;
    background: #D4AF37;
    opacity: 0.5;
    margin: 40px auto;
  }

  .falta-label {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    margin-bottom: 24px;
    text-shadow: 0 2px 14px rgba(0,0,0,0.9);
  }

  .countdown {
    display: flex;
    align-items: center;
    gap: 40px;
    margin-bottom: 48px;
  }
  .cd-unit {
    text-align: center;
  }
  .cd-num {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 120px;
    font-variation-settings: "opsz" 144, "SOFT" 30, "WONK" 0;
    color: #fff;
    line-height: 1;
    display: block;
    text-shadow: 0 4px 28px rgba(0,0,0,0.85), 0 2px 6px rgba(0,0,0,0.5);
  }
  .cd-label {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #D4AF37;
    opacity: 0.8;
    margin-top: 8px;
    display: block;
    text-shadow: 0 2px 14px rgba(0,0,0,0.9);
  }
  .cd-sep {
    font-family: 'Fraunces', serif;
    font-size: 72px;
    font-weight: 200;
    color: rgba(212,175,55,0.25);
    margin-top: -20px;
  }

  .bottom-ornament {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 48px;
  }
  .bottom-ornament span.line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.3));
  }
  .bottom-ornament span.line:last-child {
    background: linear-gradient(90deg, rgba(212,175,55,0.3), transparent);
  }
  .bottom-ornament span.diamond {
    width: 8px;
    height: 8px;
    border: 1px solid #D4AF37;
    transform: rotate(45deg);
    opacity: 0.3;
  }

  .venue {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.8);
    text-align: center;
    line-height: 1.8;
    margin-bottom: 60px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.9);
  }
  .venue strong {
    font-weight: 400;
    color: rgba(255,255,255,0.95);
  }

  .url {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: #D4AF37;
    opacity: 0.7;
    text-shadow: 0 2px 14px rgba(0,0,0,0.9);
  }
</style>
</head>
<body>
  <div class="bg-photo">
    <img src="assets/fotos/templo-abraco.jpg" alt="">
  </div>
  <div class="grain"></div>
  <div class="vignette"></div>

  <div class="content">
    <div class="top-ornament">
      <span class="line"></span>
      <span class="diamond"></span>
      <span class="line"></span>
    </div>

    <span class="date-label">12 de Junho de 2026</span>

    <h1 class="names">
      Moroni<i>&</i>Daphine
    </h1>

    <div class="gold-divider"></div>

    <span class="falta-label">Faltam</span>

    <div class="countdown" id="countdown">
      <div class="cd-unit">
        <span class="cd-num" id="cd-days">--</span>
        <span class="cd-label">Dias</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <span class="cd-num" id="cd-hours">--</span>
        <span class="cd-label">Horas</span>
      </div>
      <span class="cd-sep">:</span>
      <div class="cd-unit">
        <span class="cd-num" id="cd-min">--</span>
        <span class="cd-label">Min</span>
      </div>
    </div>

    <div class="bottom-ornament">
      <span class="line"></span>
      <span class="diamond"></span>
      <span class="line"></span>
    </div>

    <p class="venue">
      <strong>Castelo dos Lagos</strong><br>
      Ribeirão Pires, SP · 20h30
    </p>

    <span class="url">moroniedaphine.vercel.app</span>
  </div>

  <script>
    function updateCountdown() {
      const target = new Date('2026-06-12T20:30:00-03:00');
      const now = new Date();
      const diff = target - now;
      if (diff <= 0) return;
      const days = Math.floor(diff / (1000*60*60*24));
      const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
      const mins = Math.floor((diff % (1000*60*60)) / (1000*60));
      document.getElementById('cd-days').textContent = String(days).padStart(2,'0');
      document.getElementById('cd-hours').textContent = String(hours).padStart(2,'0');
      document.getElementById('cd-min').textContent = String(mins).padStart(2,'0');
    }
    updateCountdown();
    setInterval(updateCountdown, 60000);
  </script>
</body>
</html>
