<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Arte WhatsApp 1</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{width:1080px;height:1350px;overflow:hidden;background:#FAF7F2;font-family:'Inter',sans-serif;margin:0}
    .card{width:1080px;height:1350px;background:#FAF7F2;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:80px 90px 70px}

    /* Wavy border */
    .border-frame{position:absolute;inset:28px;pointer-events:none}
    .border-frame svg{width:100%;height:100%}

    .top{display:flex;flex-direction:column;align-items:center;gap:4px;z-index:2}
    .bow{margin-bottom:10px}
    .label{font-size:18px;font-weight:400;letter-spacing:.2em;text-transform:uppercase;color:#8B7D6B;opacity:.7}
    .title{font-family:'Fraunces',serif;font-weight:300;font-size:96px;line-height:.95;color:#7A2E3A;font-variation-settings:"opsz" 144,"SOFT" 60,"WONK" 1;font-style:italic}
    .title-sub{font-family:'Fraunces',serif;font-weight:300;font-size:68px;line-height:1;color:#7A2E3A;font-variation-settings:"opsz" 144,"SOFT" 60,"WONK" 1;font-style:italic}
    .names{font-family:'Fraunces',serif;font-weight:300;font-size:30px;color:#6B5B4E;font-variation-settings:"opsz" 72,"SOFT" 30;letter-spacing:.05em;margin-top:8px}
    .names em{font-style:italic;opacity:.45;font-size:.8em;padding:0 5px}

    .mid{z-index:2;display:flex;align-items:center;justify-content:center;flex:1}

    .date-row{display:flex;align-items:center;justify-content:center;gap:32px;z-index:2}
    .date-side{font-size:22px;font-weight:300;letter-spacing:.12em;text-transform:uppercase;color:#6B5B4E;text-align:center;line-height:1.5}
    .date-num{font-family:'Fraunces',serif;font-weight:300;font-size:120px;line-height:1;color:#7A2E3A;font-variation-settings:"opsz" 144,"SOFT" 20}
    .heart{color:#7A2E3A;opacity:.4}

    .bot{display:flex;flex-direction:column;align-items:center;gap:16px;z-index:2}
    .divline{width:60px;height:1px;background:#7A2E3A;opacity:.2}
    .loc{font-size:20px;font-weight:300;color:#6B5B4E;opacity:.65;text-align:center;line-height:1.6}
    .link-label{font-size:18px;font-weight:300;color:#7A2E3A;opacity:.55;letter-spacing:.04em}
    .link{font-size:21px;font-weight:400;color:#7A2E3A;opacity:.8;letter-spacing:.03em}
  </style>
</head>
<body>
<div class="card">

  <div class="border-frame">

      <path d="M50 25 C90 20,140 30,190 24 C240 18,290 30,340 24 C390 18,440 30,490 24 C540 18,590 30,640 24 C690 18,740 30,790 24 C840 18,890 30,940 24 C965 20,980 24,1000 25 C1004 60,996 110,1002 160 C1008 210,996 260,1002 310 C1008 360,996 410,1002 460 C1008 510,996 560,1002 610 C1008 660,996 710,1002 760 C1008 810,996 860,1002 910 C1008 960,996 1010,1002 1060 C1008 1110,996 1160,1002 1210 C1004 1240,1000 1260,1000 1270 C965 1274,940 1266,890 1272 C840 1278,790 1266,740 1272 C690 1278,640 1266,590 1272 C540 1278,490 1266,440 1272 C390 1278,340 1266,290 1272 C240 1278,190 1266,140 1272 C90 1278,60 1270,50 1270 C46 1240,54 1190,48 1140 C42 1090,54 1040,48 990 C42 940,54 890,48 840 C42 790,54 740,48 690 C42 640,54 590,48 540 C42 490,54 440,48 390 C42 340,54 290,48 240 C42 190,54 140,48 90 C44 55,48 35,50 25Z" stroke="#8B7D6B" stroke-width="2" fill="none" opacity=".28"/>
    </svg>
  </div>

  <div class="top">
    <svg class="bow" width="90" height="45" viewBox="0 0 120 60" fill="none">

      <path d="M60 30 C70 10,100 5,110 20 C115 30,105 40,90 35 C80 32,65 30,60 30Z" stroke="#8B7D6B" stroke-width="2" fill="none" opacity=".45"/>

      <path d="M65 30 C64 38,68 48,72 55" stroke="#8B7D6B" stroke-width="1.5" fill="none" opacity=".35"/>
    </svg>
    <span class="label">Vocês estão convidados para o</span>
    <h1 class="title">Chá de</h1>

      <!-- Extra buds -->

      <!-- Teapot (right) -->
      <ellipse cx="405" cy="285" rx="32" ry="25" stroke="#8B7D6B" stroke-width="1.8" fill="none" opacity=".4"/>

      <!-- Cup + saucer -->

      <!-- Plate + utensils (far left) -->
      <ellipse cx="75" cy="318" rx="35" ry="7" stroke="#8B7D6B" stroke-width="1.3" fill="none" opacity=".3"/>
      <ellipse cx="75" cy="316" rx="24" ry="4.5" stroke="#8B7D6B" stroke-width=".8" fill="none" opacity=".18"/>

  <div class="date-row">
    <div class="date-side">Sábado<br>às 19h</div>
    <svg class="heart" width="12" height="12" viewBox="0 0 24 24" fill="#7A2E3A"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    <div class="date-num">06</div>
    <svg class="heart" width="12" height="12" viewBox="0 0 24 24" fill="#7A2E3A"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    <div class="date-side">Jun<br>2026</div>
  </div>

  <div class="bot">

    <p class="loc">Capela Faustino Augusto Cesar 81<br>Igreja de Jesus Cristo dos Santos dos Últimos Dias</p>

    <p class="link-label">Confirme e veja a lista de presentes:</p>

  </div>

</div>
</body>
</html>
