<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chá de Casa Nova 1 — Porta com Plantas</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{width:1080px;height:1350px;overflow:hidden;background:#FAF7F2;font-family:'Inter',sans-serif;margin:0}
    .card{width:1080px;height:1350px;background:#FAF7F2;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:70px 100px 65px}

    /* Wavy hand-drawn border */
    .border-frame{position:absolute;inset:28px;pointer-events:none}
    .border-frame svg{width:100%;height:100%}

    .top{display:flex;flex-direction:column;align-items:center;gap:2px;z-index:2}
    .label{font-size:17px;font-weight:400;letter-spacing:.2em;text-transform:uppercase;color:#8B7D6B;opacity:.6}
    .title1{font-family:'Fraunces',serif;font-weight:300;font-size:92px;line-height:.95;color:#7A2E3A;font-variation-settings:"opsz" 144,"SOFT" 60,"WONK" 1;font-style:italic}
    .title2{font-family:'Fraunces',serif;font-weight:300;font-size:80px;line-height:.9;color:#7A2E3A;font-variation-settings:"opsz" 144,"SOFT" 55,"WONK" 1;font-style:italic;margin-top:-4px}

    .mid{z-index:2;display:flex;flex-direction:column;align-items:center;flex:1;justify-content:center;gap:0}

    .names{font-family:'Fraunces',serif;font-weight:300;font-size:30px;color:#6B5B4E;font-variation-settings:"opsz" 72,"SOFT" 25;letter-spacing:.06em}
    .names em{font-style:italic;opacity:.4;font-size:.75em;padding:0 6px}

    .date-row{display:flex;align-items:center;justify-content:center;gap:28px;margin-top:28px}
    .date-side{font-size:20px;font-weight:300;letter-spacing:.1em;text-transform:uppercase;color:#6B5B4E;text-align:center;line-height:1.5}
    .date-num{font-family:'Fraunces',serif;font-weight:300;font-size:110px;line-height:1;color:#7A2E3A;font-variation-settings:"opsz" 144,"SOFT" 15}
    .heart{color:#7A2E3A;opacity:.35}

    .bot{display:flex;flex-direction:column;align-items:center;gap:14px;z-index:2}
    .divline{width:55px;height:1px;background:#7A2E3A;opacity:.18}
    .loc{font-size:19px;font-weight:300;color:#6B5B4E;opacity:.55;text-align:center;line-height:1.65}
    .link-hint{font-size:16px;font-weight:300;color:#7A2E3A;opacity:.45;letter-spacing:.03em}
    .link-url{font-size:20px;font-weight:400;color:#7A2E3A;opacity:.75;letter-spacing:.02em}
  </style>
</head>
<body>
<div class="card">

  <div class="border-frame">
    <svg viewBox="0 0 1024 1294" fill="none">
      <path d="M50 25 C90 20,140 30,190 24 C240 18,290 30,340 24 C390 18,440 30,490 24 C540 18,590 30,640 24 C690 18,740 30,790 24 C840 18,890 30,940 24 C965 20,980 24,1000 25 C1004 60,996 110,1002 160 C1008 210,996 260,1002 310 C1008 360,996 410,1002 460 C1008 510,996 560,1002 610 C1008 660,996 710,1002 760 C1008 810,996 860,1002 910 C1008 960,996 1010,1002 1060 C1008 1110,996 1160,1002 1210 C1004 1240,1000 1260,1000 1270 C965 1274,940 1266,890 1272 C840 1278,790 1266,740 1272 C690 1278,640 1266,590 1272 C540 1278,490 1266,440 1272 C390 1278,340 1266,290 1272 C240 1278,190 1266,140 1272 C90 1278,60 1270,50 1270 C46 1240,54 1190,48 1140 C42 1090,54 1040,48 990 C42 940,54 890,48 840 C42 790,54 740,48 690 C42 640,54 590,48 540 C42 490,54 440,48 390 C42 340,54 290,48 240 C42 190,54 140,48 90 C44 55,48 35,50 25Z" stroke="#8B7D6B" stroke-width="2" fill="none" opacity=".25"/>
    </svg>
  </div>

  <div class="top">
    <!-- Bow -->
    <svg width="80" height="38" viewBox="0 0 120 60" fill="none" style="margin-bottom:6px">
      <path d="M60 30 C50 12,22 6,12 18 C6 28,16 38,30 34 C42 31,55 30,60 30Z" stroke="#6B5B4E" stroke-width="2" fill="none" opacity=".4"/>
      <path d="M60 30 C70 12,98 6,108 18 C114 28,104 38,90 34 C78 31,65 30,60 30Z" stroke="#6B5B4E" stroke-width="2" fill="none" opacity=".4"/>
      <path d="M56 30 C56 36,53 46,50 54" stroke="#6B5B4E" stroke-width="1.5" fill="none" opacity=".3"/>
      <path d="M64 30 C64 36,67 46,70 54" stroke="#6B5B4E" stroke-width="1.5" fill="none" opacity=".3"/>
    </svg>
    <span class="label">Vocês estão convidados para o</span>
    <h1 class="title1">Chá de</h1>
    <h1 class="title2">Casa Nova</h1>
  </div>

  <div class="mid">
    <!-- Door with plants illustration — like reference -->
    <svg width="420" height="500" viewBox="0 0 420 500" fill="none">
      <!-- Ground/step -->
      <rect x="100" y="440" width="220" height="12" rx="2" stroke="#8B7D6B" stroke-width="1.8" fill="none" opacity=".3"/>
      <rect x="85" y="452" width="250" height="10" rx="2" stroke="#8B7D6B" stroke-width="1.5" fill="none" opacity=".22"/>
      <!-- Floor tiles -->
      <path d="M120 462 L140 462" stroke="#8B7D6B" stroke-width="1" opacity=".12"/>
      <path d="M155 462 L175 462" stroke="#8B7D6B" stroke-width="1" opacity=".12"/>
      <path d="M190 462 L210 462" stroke="#8B7D6B" stroke-width="1" opacity=".12"/>
      <path d="M225 462 L245 462" stroke="#8B7D6B" stroke-width="1" opacity=".12"/>
      <path d="M260 462 L280 462" stroke="#8B7D6B" stroke-width="1" opacity=".12"/>
      <path d="M295 462 L315 462" stroke="#8B7D6B" stroke-width="1" opacity=".12"/>

      <!-- Door frame -->
      <rect x="140" y="120" width="140" height="320" rx="3" stroke="#8B7D6B" stroke-width="2.5" fill="none" opacity=".4"/>
      <!-- Door arch -->
      <path d="M140 180 C140 140,210 100,280 140 L280 180" stroke="#8B7D6B" stroke-width="2.5" fill="none" opacity=".4"/>
      <!-- Arch window panes -->
      <line x1="210" y1="115" x2="210" y2="180" stroke="#8B7D6B" stroke-width="1.2" opacity=".25"/>
      <path d="M155 180 L265 180" stroke="#8B7D6B" stroke-width="1.2" opacity=".25"/>
      <!-- Door panels -->
      <rect x="155" y="195" width="110" height="80" rx="2" stroke="#8B7D6B" stroke-width="1.5" fill="none" opacity=".25"/>
      <rect x="155" y="290" width="110" height="140" rx="2" stroke="#8B7D6B" stroke-width="1.5" fill="none" opacity=".25"/>
      <!-- Door handle -->
      <circle cx="248" cy="340" r="5" stroke="#7A2E3A" stroke-width="1.5" fill="none" opacity=".4"/>
      <circle cx="248" cy="340" r="2" fill="#7A2E3A" opacity=".25"/>
      <!-- Keyhole -->
      <ellipse cx="248" cy="352" rx="2.5" ry="4" stroke="#8B7D6B" stroke-width="1" fill="none" opacity=".25"/>

      <!-- Lantern above door -->
      <line x1="210" y1="85" x2="210" y2="100" stroke="#8B7D6B" stroke-width="1.2" opacity=".3"/>
      <path d="M200 100 L220 100 L218 115 L202 115 Z" stroke="#8B7D6B" stroke-width="1.2" fill="none" opacity=".3"/>
      <line x1="210" y1="100" x2="210" y2="112" stroke="#8B7D6B" stroke-width=".8" opacity=".15"/>

      <!-- Left topiary plant -->
      <rect x="62" y="380" width="40" height="60" rx="3" stroke="#8B7D6B" stroke-width="1.8" fill="none" opacity=".35"/>
      <!-- Pot rim -->
      <rect x="58" y="375" width="48" height="8" rx="2" stroke="#8B7D6B" stroke-width="1.5" fill="none" opacity=".3"/>
      <!-- Stem -->
      <line x1="82" y1="375" x2="82" y2="320" stroke="#8B7D6B" stroke-width="1.5" opacity=".3"/>
      <!-- Round bush -->
      <circle cx="82" cy="290" r="38" stroke="#8B7D6B" stroke-width="2" fill="none" opacity=".3"/>
      <!-- Leaf details -->
      <path d="M60 285 C65 275,72 278,70 288" stroke="#8B7D6B" stroke-width=".8" fill="none" opacity=".15"/>
      <path d="M95 275 C100 268,106 272,103 280" stroke="#8B7D6B" stroke-width=".8" fill="none" opacity=".15"/>
      <path d="M75 260 C78 252,85 255,83 262" stroke="#8B7D6B" stroke-width=".8" fill="none" opacity=".15"/>
      <path d="M90 300 C95 294,100 298,97 305" stroke="#8B7D6B" stroke-width=".8" fill="none" opacity=".15"/>

      <!-- Right topiary plant -->
      <rect x="318" y="380" width="40" height="60" rx="3" stroke="#8B7D6B" stroke-width="1.8" fill="none" opacity=".35"/>
      <rect x="314" y="375" width="48" height="8" rx="2" stroke="#8B7D6B" stroke-width="1.5" fill="none" opacity=".3"/>
      <line x1="338" y1="375" x2="338" y2="320" stroke="#8B7D6B" stroke-width="1.5" opacity=".3"/>
      <circle cx="338" cy="290" r="38" stroke="#8B7D6B" stroke-width="2" fill="none" opacity=".3"/>
      <path d="M320 285 C325 275,332 278,330 288" stroke="#8B7D6B" stroke-width=".8" fill="none" opacity=".15"/>
      <path d="M355 275 C360 268,366 272,363 280" stroke="#8B7D6B" stroke-width=".8" fill="none" opacity=".15"/>
      <path d="M335 260 C338 252,345 255,343 262" stroke="#8B7D6B" stroke-width=".8" fill="none" opacity=".15"/>
      <path d="M350 300 C355 294,360 298,357 305" stroke="#8B7D6B" stroke-width=".8" fill="none" opacity=".15"/>

      <!-- Welcome mat -->
      <rect x="170" y="442" width="80" height="10" rx="1.5" stroke="#8B7D6B" stroke-width="1" fill="none" opacity=".2"/>
      <path d="M180 447 L260 447" stroke="#8B7D6B" stroke-width=".6" opacity=".12"/>

      <!-- Small heart on the door -->
      <path d="M210 235 C208 231,202 228,202 223 C202 219,205 217,208 217 C209.5 217,210.5 218,210 220 C211.5 218,212.5 217,214 217 C217 217,220 219,220 223 C220 228,214 231,210 235Z" stroke="#7A2E3A" stroke-width="1.2" fill="none" opacity=".3"/>
    </svg>

    <p class="names" style="margin-top:16px">Moroni <em>&</em> Daphine</p>
  </div>

  <div class="date-row">
    <div class="date-side">Sábado<br>às 19h</div>
    <svg class="heart" width="11" height="11" viewBox="0 0 24 24" fill="#7A2E3A"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    <div class="date-num">06</div>
    <svg class="heart" width="11" height="11" viewBox="0 0 24 24" fill="#7A2E3A"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    <div class="date-side">Jun<br>2026</div>
  </div>

  <div class="bot">
    <div class="divline"></div>
    <p class="loc">Capela Faustino Augusto Cesar 81<br>Igreja de Jesus Cristo dos Santos dos Últimos Dias</p>
    <div class="divline"></div>
    <p class="link-hint">Confirme e veja a lista de presentes:</p>
    <p class="link-url">moroniedaphine.vercel.app/cha-de-cozinha</p>
  </div>

</div>
</body>
</html>
