<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arte — Chá de Cozinha M&D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      margin: 0;
      padding: 0;
      background: #FAF7F2;
      font-family: 'Inter', sans-serif;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
    }

    .card {
      width: 1080px;
      height: 1920px;
      background: #FAF7F2;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Hand-drawn wavy border */
    .border-frame {
      position: absolute;
      inset: 32px;
      pointer-events: none;
    }

    .border-frame svg {
      width: 100%;
      height: 100%;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 120px 100px;
      width: 100%;
      height: 100%;
      justify-content: space-between;
    }

    .top-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .ribbon-bow {
      margin-bottom: 16px;
    }

    .label-top {
      font-family: 'Inter', sans-serif;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #6B5B4E;
      opacity: 0.7;
    }

    .event-name {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 108px;
      line-height: 1.0;
      color: #7A2E3A;
      font-variation-settings: "opsz" 144, "SOFT" 60, "WONK" 1;
      font-style: italic;
      margin: 8px 0 0;
    }

    .event-name-sub {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 72px;
      line-height: 1.0;
      color: #7A2E3A;
      font-variation-settings: "opsz" 144, "SOFT" 60, "WONK" 1;
      font-style: italic;
    }

    .couple-names {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 36px;
      color: #6B5B4E;
      font-variation-settings: "opsz" 72, "SOFT" 30, "WONK" 0;
      letter-spacing: 0.06em;
      margin-top: 12px;
    }

    .couple-names em {
      font-style: italic;
      opacity: 0.5;
      font-size: 0.8em;
      padding: 0 6px;
    }

    /* Center illustration */
    .illustration {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      max-height: 700px;
    }

    /* Date block */
    .date-block {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    .date-side {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #6B5B4E;
    }

    .date-day {
      font-family: 'Fraunces', serif;
      font-weight: 300;
      font-size: 140px;
      line-height: 1;
      color: #7A2E3A;
      font-variation-settings: "opsz" 144, "SOFT" 20, "WONK" 0;
      position: relative;
    }

    .date-hearts {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .heart-sm {
      color: #7A2E3A;
      opacity: 0.5;
    }

    /* Bottom info */
    .bottom-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .time-info {
      font-family: 'Inter', sans-serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #6B5B4E;
    }

    .location-info {
      font-family: 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 300;
      color: #6B5B4E;
      opacity: 0.7;
      line-height: 1.6;
      max-width: 700px;
    }

    .divider-line {
      width: 80px;
      height: 1px;
      background: #7A2E3A;
      opacity: 0.25;
    }

    .link-info {
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 400;
      color: #7A2E3A;
      letter-spacing: 0.06em;
      opacity: 0.65;
    }

  </style>
