<!DOCTYPE html>
<!-- CONFIGURE: Replace PLACEHOLDER_SUPABASE_URL, PLACEHOLDER_SUPABASE_ANON_KEY, PLACEHOLDER_SUPABASE_SERVICE_KEY with real values -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M&D — Painel de Convidados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --wine: #2D0A0F;
      --wine-deep: #1A0508;
      --wine-mid: #4A1019;
      --wine-tint: #F7F0F1;
      --parchment: #FAF8F6;
      --white: #FFFFFF;
      --white-muted: rgba(255,255,255,0.82);
      --white-dim: rgba(255,255,255,0.40);
      --gold: #D4AF37;
      --gold-border: rgba(212,175,55,0.30);
      --fd: 'Fraunces', Georgia, serif;
      --fu: 'Inter', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: var(--wine-deep);
      color: var(--white);
      font-family: var(--fu);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--wine);
      border-bottom: 1px solid var(--gold-border);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header__brand {
      font-family: var(--fd);
      font-weight: 300;
      font-size: 22px;
      font-variation-settings: "opsz" 72, "SOFT" 40, "WONK" 0;
      letter-spacing: .08em;
    }
    .header__brand i { font-style: italic; opacity: .5; padding: 0 .06em; }
    .header__sub {
      font-family: var(--fu);
      font-size: 10px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: var(--gold);
      opacity: .6;
      margin-top: 4px;
    }
    .header__refresh {
      font-family: var(--fu);
      font-size: 11px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: var(--gold);
      opacity: .6;
      cursor: pointer;
      border: 1px solid var(--gold-border);
      padding: 8px 20px;
      background: transparent;
      transition: all 400ms;
    }
    .header__refresh:hover { opacity: 1; background: rgba(212,175,55,0.08); }

    /* ── STATS ── */
    .stats-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--gold-border);
      background: var(--wine-mid);
    }
    .stat {
      flex: 1;
      padding: 20px 24px;
      text-align: center;
      border-right: 1px solid var(--gold-border);
    }
    .stat:last-child { border-right: none; }
    .stat__num {
      font-family: var(--fd);
      font-weight: 300;
      font-size: 36px;
      font-variation-settings: "opsz" 72, "SOFT" 20, "WONK" 0;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat__label {
      font-family: var(--fu);
      font-size: 9px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .18em;
      opacity: .45;
    }

    /* ── FILTER TABS ── */
    .filters {
      padding: 0 32px;
      background: var(--wine);
      border-bottom: 1px solid var(--gold-border);
      display: flex;
      gap: 0;
      overflow-x: auto;
    }
    .filter-tab {
      font-family: var(--fu);
      font-size: 11px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .14em;
      padding: 16px 24px;
      cursor: pointer;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--white-dim);
      white-space: nowrap;
      transition: all 300ms;
    }
    .filter-tab:hover { color: var(--white-muted); }
    .filter-tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
      opacity: 1;
    }

    /* ── TABLE WRAPPER ── */
    .table-wrap {
      padding: 32px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }
    thead th {
      font-family: var(--fu);
      font-size: 9px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .18em;
      color: var(--gold);
      opacity: .5;
      padding: 0 16px 14px;
      text-align: left;
      border-bottom: 1px solid var(--gold-border);
    }
    tbody tr {
      border-bottom: 1px solid rgba(212,175,55,0.08);
      transition: background 300ms;
    }
    tbody tr:hover { background: rgba(212,175,55,0.04); }
    td {
      padding: 16px;
      font-family: var(--fu);
      font-size: 13px;
      font-weight: 300;
      color: var(--white-muted);
      vertical-align: top;
    }
    .td-name {
      font-family: var(--fd);
      font-weight: 300;
      font-size: 15px;
      font-variation-settings: "opsz" 48, "SOFT" 20, "WONK" 0;
      color: var(--white);
    }
    .companions-list {
      margin-top: 6px;
      font-size: 11px;
      opacity: .45;
      line-height: 1.7;
    }
    .companions-list span { display: block; }

    /* ── STATUS BADGE ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      font-family: var(--fu);
      font-size: 9px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: .14em;
    }
    .badge--pendente   { color: var(--gold); border: 1px solid rgba(212,175,55,0.35); }
    .badge--aprovado   { color: #6AADFF; border: 1px solid rgba(106,173,255,0.35); }
    .badge--enviado    { color: #9BDDFF; border: 1px solid rgba(155,221,255,0.35); }
    .badge--confirmado { color: #6FCF97; border: 1px solid rgba(111,207,151,0.35); }
    .badge--recusado   { color: #EB5757; border: 1px solid rgba(235,87,87,0.35); }

    /* ── STATUS SELECT ── */
    .status-select {
      font-family: var(--fu);
      font-size: 11px;
      font-weight: 300;
      color: var(--white-muted);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--gold-border);
      padding: 6px 10px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      transition: border-color 300ms;
      min-width: 140px;
    }
    .status-select:hover { border-color: rgba(212,175,55,0.55); }

    /* ── FONTE TAG ── */
    .fonte-tag {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .14em;
      padding: 2px 8px;
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--white-dim);
    }

    /* ── EMPTY / LOADING STATE ── */
    .state-msg {
      text-align: center;
      padding: 64px 32px;
      font-family: var(--fd);
      font-weight: 300;
      font-size: 20px;
      font-variation-settings: "opsz" 72, "SOFT" 30, "WONK" 0;
      color: var(--white-dim);
    }

    /* ── GOLD DIVIDER ── */
    .gold-line {
      width: 40px;
      height: 1px;
      background: var(--gold);
      opacity: .3;
      margin: 0 auto 4px;
      display: block;
    }

    /* ── KANBAN MESAS ── */
    .kanban-wrap { padding: 32px; display: none; }
    .kanban-wrap.active { display: block; }
    .kanban-toolbar {
      display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .kanban-toolbar button {
      font-family: var(--fu); font-size: 11px; font-weight: 400; text-transform: uppercase;
      letter-spacing: .12em; padding: 8px 20px; cursor: pointer; border: 1px solid var(--gold-border);
      background: transparent; color: var(--gold); opacity: .7; transition: all 300ms;
    }
    .kanban-toolbar button:hover { opacity: 1; background: rgba(212,175,55,0.08); }
    .kanban-toolbar .mesa-count {
      font-family: var(--fu); font-size: 12px; color: var(--white-dim); margin-left: auto;
    }
    .kanban-board {
      display: flex; gap: 20px; overflow-x: auto; padding-bottom: 16px;
      min-height: 400px; align-items: flex-start;
    }
    .kanban-col {
      min-width: 260px; max-width: 300px; flex-shrink: 0;
      background: var(--wine); border: 1px solid var(--gold-border); display: flex; flex-direction: column;
    }
    .kanban-col--unassigned { border-style: dashed; opacity: .8; }
    .kanban-col-header {
      padding: 16px; border-bottom: 1px solid var(--gold-border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .kanban-col-title {
      font-family: var(--fd); font-weight: 300; font-size: 18px;
      font-variation-settings: "opsz" 72, "SOFT" 30, "WONK" 0;
    }
    .kanban-col-count {
      font-family: var(--fu); font-size: 10px; letter-spacing: .12em;
      text-transform: uppercase; color: var(--gold); opacity: .5;
    }
    .kanban-col-body {
      padding: 12px; min-height: 80px; flex: 1;
      display: flex; flex-direction: column; gap: 8px;
    }
    .kanban-col-body.drag-over { background: rgba(212,175,55,0.06); }
    .kanban-card {
      padding: 12px 14px; border: 1px solid rgba(212,175,55,0.12);
      background: var(--wine-deep); cursor: grab; transition: all 200ms;
    }
    .kanban-card:active { cursor: grabbing; }
    .kanban-card.dragging { opacity: .4; }
    .kanban-card-name {
      font-family: var(--fd); font-weight: 300; font-size: 14px;
      font-variation-settings: "opsz" 48, "SOFT" 20, "WONK" 0; color: var(--white);
    }
    .kanban-card-comp {
      font-family: var(--fu); font-size: 10px; color: var(--white-dim);
      margin-top: 4px; line-height: 1.5;
    }
    .kanban-card-fonte {
      font-family: var(--fu); font-size: 9px; text-transform: uppercase;
      letter-spacing: .1em; color: var(--gold); opacity: .4; margin-top: 6px;
    }
    .kanban-col-actions {
      padding: 8px 12px; border-top: 1px solid rgba(212,175,55,0.08);
      display: flex; gap: 8px;
    }
    .kanban-col-actions button {
      font-family: var(--fu); font-size: 9px; letter-spacing: .08em; text-transform: uppercase;
      padding: 4px 10px; border: 1px solid rgba(212,175,55,0.15); background: transparent;
      color: var(--white-dim); cursor: pointer; transition: all 200ms;
    }
    .kanban-col-actions button:hover { color: var(--gold); border-color: var(--gold-border); }
    .kanban-col-actions .btn-del:hover { color: #EB5757; border-color: rgba(235,87,87,0.3); }

    @media (max-width: 768px) {
      .stats-bar { flex-wrap: wrap; }
      .stat { flex: 1 1 50%; }
      .header { flex-direction: column; gap: 16px; align-items: flex-start; }
      .table-wrap { padding: 16px; }
      .kanban-wrap { padding: 16px; }
      .kanban-col { min-width: 220px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div>
    <p class="header__brand">M<i>&amp;</i>D</p>
    <p class="header__sub">Painel de Convidados</p>
  </div>
  <button class="header__refresh" onclick="renderGuests()">Atualizar</button>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat__num" id="stat-total-pessoas">—</div>
    <div class="stat__label">Total Pessoas</div>
    <div class="stat__detail" id="stat-total-detail" style="font-size:10px;opacity:.4;margin-top:4px;"></div>
  </div>
  <div class="stat">
    <div class="stat__num" id="stat-confirmados-pessoas">—</div>
    <div class="stat__label">Confirmados</div>
    <div class="stat__detail" id="stat-confirmados-detail" style="font-size:10px;opacity:.4;margin-top:4px;"></div>
  </div>
  <div class="stat">
    <div class="stat__num" id="stat-enviados">—</div>
    <div class="stat__label">Enviados</div>
    <div class="stat__detail" id="stat-enviados-detail" style="font-size:10px;opacity:.4;margin-top:4px;"></div>
  </div>
  <div class="stat">
    <div class="stat__num" id="stat-pendentes">—</div>
    <div class="stat__label">Pendentes</div>
    <div class="stat__detail" id="stat-pendentes-detail" style="font-size:10px;opacity:.4;margin-top:4px;"></div>
  </div>
  <div class="stat">
    <div class="stat__num" id="stat-recusados">—</div>
    <div class="stat__label">Recusados</div>
  </div>
  <div class="stat" style="border-left:1px solid var(--gold-border);padding-left:16px;">
    <div class="stat__num" id="stat-cha-total" style="color:var(--gold);">—</div>
    <div class="stat__label">Chá de Cozinha</div>
    <div class="stat__detail" id="stat-cha-detail" style="font-size:10px;opacity:.4;margin-top:4px;"></div>
  </div>
</div>

<!-- FILTER TABS -->
<nav class="filters">
  <button class="filter-tab active" data-status="todos" onclick="setFilter('todos', this)">Todos</button>
  <button class="filter-tab" data-status="pendente" onclick="setFilter('pendente', this)">Pendentes</button>
  <button class="filter-tab" data-status="aprovado" onclick="setFilter('aprovado', this)">Aprovados</button>
  <button class="filter-tab" data-status="enviado" onclick="setFilter('enviado', this)">Convite Enviado</button>
  <button class="filter-tab" data-status="confirmado" onclick="setFilter('confirmado', this)">Confirmados</button>
  <button class="filter-tab" data-status="recusado" onclick="setFilter('recusado', this)">Recusados</button>
  <span style="width:1px;height:20px;background:var(--gold-border);margin:0 8px;"></span>
  <button class="filter-tab" data-status="cha-cozinha" onclick="setFilter('cha-cozinha', this)" style="color:var(--gold);opacity:.7;">Chá de Cozinha</button>
  <span style="width:1px;height:20px;background:var(--gold-border);margin:0 8px;"></span>
  <button class="filter-tab" data-status="mesas" onclick="setFilter('mesas', this)" style="color:#6FCF97;opacity:.8;">Mesas</button>
</nav>

<!-- TABLE -->
<div class="table-wrap" id="table-view">
  <div id="table-container">
    <div class="state-msg" id="loading-msg">Carregando convidados...</div>
  </div>
</div>

<!-- KANBAN MESAS -->
<div class="kanban-wrap" id="kanban-view">
  <div class="kanban-toolbar">
    <button onclick="addMesa()">+ Nova Mesa</button>
    <button onclick="saveMesas()">Salvar Layout</button>
    <button onclick="resetMesas()">Resetar</button>
    <span class="mesa-count" id="mesa-stats"></span>
  </div>
  <div class="kanban-board" id="kanban-board"></div>
</div>

<script>
  const SUPABASE_URL = 'https://weirdpigeon-supabase.cloudfy.live';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UiLCJpYXQiOjE3NzM3Njg1MTYsImV4cCI6MTgwNTMwNDUxNn0.Hziwx8ocWnFVLHvt5DhT8nTkL2XVMa58ofjL-0hCMxw';

  let currentFilter = 'todos';
  let allGuests = [];

  async function loadGuests() {
    let url = SUPABASE_URL + '/rest/v1/wedding_guests?select=*,wedding_companions(*)&order=created_at.desc';
    const res = await fetch(url, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });
    return res.json();
  }

  async function updateStatus(id, newStatus) {
    await fetch(SUPABASE_URL + '/rest/v1/wedding_guests?id=eq.' + id, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      },
      body: JSON.stringify({ status: newStatus, updated_at: new Date().toISOString() })
    });
    await renderGuests();
  }

  async function deleteGuest(id, nome) {
    if (!confirm('Deletar "' + nome + '" e todos os acompanhantes?')) return;
    await fetch(SUPABASE_URL + '/rest/v1/wedding_companions?guest_id=eq.' + id, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    await fetch(SUPABASE_URL + '/rest/v1/wedding_guests?id=eq.' + id, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    await renderGuests();
  }

  function copyLink(id, nome, btn) {
    const link = 'https://moroniedaphine.vercel.app/confirmar?id=' + id;
    navigator.clipboard.writeText(link).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copiado!';
      btn.style.color = '#4CAF50';
      btn.style.borderColor = '#4CAF50';
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 2000);
    });
  }

  function setFilter(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    const tableView = document.getElementById('table-view');
    const kanbanView = document.getElementById('kanban-view');
    if (status === 'mesas') {
      tableView.style.display = 'none';
      kanbanView.classList.add('active');
      drawKanban();
    } else {
      tableView.style.display = '';
      kanbanView.classList.remove('active');
      drawTable();
    }
  }

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' }) +
           ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function badgeHTML(status) {
    const s = (status || 'pendente').toLowerCase();
    const labels = {
      pendente: 'Pendente',
      aprovado: 'Aprovado',
      enviado: 'Convite Enviado',
      confirmado: 'Confirmado',
      recusado: 'Recusado'
    };
    return `<span class="badge badge--${s}">${labels[s] || s}</span>`;
  }

  function drawTable() {
    const container = document.getElementById('table-container');

    // Stats (always from allGuests regardless of filter)
    function countPeople(list) {
      let convites = list.length;
      let acomp = 0;
      list.forEach(g => {
        const comps = Array.isArray(g.wedding_companions) ? g.wedding_companions.length : 0;
        const declared = g.acompanhantes != null ? parseInt(g.acompanhantes) : 0;
        acomp += Math.max(comps, declared);
      });
      return { convites, acomp, total: convites + acomp };
    }

    // Separate casamento vs chá
    const casamentoGuests = allGuests.filter(g => !(g.mensagem && g.mensagem.includes('[CHA-COZINHA]')));
    const chaGuests = allGuests.filter(g => g.mensagem && g.mensagem.includes('[CHA-COZINHA]'));

    const all = countPeople(casamentoGuests);
    const conf = countPeople(casamentoGuests.filter(g => g.status === 'confirmado'));
    const env = countPeople(casamentoGuests.filter(g => g.status === 'enviado'));
    const pend = countPeople(casamentoGuests.filter(g => !g.status || g.status === 'pendente'));
    const recusados = casamentoGuests.filter(g => g.status === 'recusado').length;

    document.getElementById('stat-total-pessoas').textContent = all.total;
    document.getElementById('stat-total-detail').textContent = all.convites + ' convites + ' + all.acomp + ' acomp.';
    document.getElementById('stat-confirmados-pessoas').textContent = conf.total;
    document.getElementById('stat-confirmados-detail').textContent = conf.convites + ' convites + ' + conf.acomp + ' acomp.';
    document.getElementById('stat-enviados').textContent = env.total;
    document.getElementById('stat-enviados-detail').textContent = env.convites + ' convites + ' + env.acomp + ' acomp.';
    document.getElementById('stat-pendentes').textContent = pend.total;
    document.getElementById('stat-pendentes-detail').textContent = pend.convites + ' convites + ' + pend.acomp + ' acomp.';
    document.getElementById('stat-recusados').textContent = recusados;

    // Chá de cozinha stats
    const chaTotal = chaGuests.length;
    const chaPresentes = chaGuests.filter(g => g.mensagem && g.mensagem.includes('Presente:')).length;
    document.getElementById('stat-cha-total').textContent = chaTotal;
    document.getElementById('stat-cha-detail').textContent = chaPresentes + ' com presente escolhido';

    // Filter
    let guests;
    if (currentFilter === 'todos') {
      guests = allGuests.filter(g => !(g.mensagem && g.mensagem.includes('[CHA-COZINHA]')));
    } else if (currentFilter === 'cha-cozinha') {
      guests = allGuests.filter(g => g.mensagem && g.mensagem.includes('[CHA-COZINHA]'));
    } else {
      guests = allGuests.filter(g => {
        const s = g.status || 'pendente';
        return s === currentFilter && !(g.mensagem && g.mensagem.includes('[CHA-COZINHA]'));
      });
    }

    if (!guests.length) {
      container.innerHTML = '<div class="state-msg">Nenhum convidado encontrado.</div>';
      return;
    }

    const isCha = currentFilter === 'cha-cozinha';

    let rows = guests.map(g => {
      const comps = Array.isArray(g.wedding_companions) ? g.wedding_companions : [];
      const compHTML = comps.length
        ? `<div class="companions-list">${comps.map(c => `<span>${c.nome}${c.idade ? ', ' + c.idade + ' anos' : ''}</span>`).join('')}</div>`
        : '';

      const statusOptions = ['pendente','aprovado','enviado','confirmado','recusado'];
      const currentStatus = g.status || 'pendente';
      const selectOptions = statusOptions.map(s => {
        const labels = { pendente:'Pendente', aprovado:'Aprovado', enviado:'Convite Enviado', confirmado:'Confirmado', recusado:'Recusado' };
        return `<option value="${s}" ${s === currentStatus ? 'selected' : ''}>${labels[s]}</option>`;
      }).join('');

      const restricoes = g.restricoes_alimentares ? `<div style="font-size:11px;opacity:.45;margin-top:4px;">${g.restricoes_alimentares}</div>` : '';
      const mensagem = g.mensagem ? `<div style="font-size:11px;opacity:.45;margin-top:4px;font-style:italic;">"${g.mensagem}"</div>` : '';

      // Parse presente e prato from mensagem for chá
      let presenteCha = '—';
      let pratoCha = '—';
      if (isCha && g.mensagem) {
        const pm = g.mensagem.match(/Presente:\s*([^|]+)/);
        const pp = g.mensagem.match(/Prato:\s*(.+)/);
        if (pm) presenteCha = pm[1].trim();
        if (pp) pratoCha = pp[1].trim();
      }

      if (isCha) {
        return `
          <tr>
            <td><div class="td-name">${g.nome || '—'}</div></td>
            <td>${g.whatsapp || '—'}</td>
            <td><span style="color:var(--gold);font-size:12px;">${presenteCha}</span></td>
            <td style="font-size:12px;">${pratoCha}</td>
            <td>${badgeHTML(g.status)}</td>
            <td>${formatDate(g.created_at)}</td>
            <td>
              <select class="status-select" onchange="updateStatus('${g.id}', this.value)">
                ${selectOptions}
              </select>
              <button onclick="deleteGuest('${g.id}', '${(g.nome||'').replace(/'/g,"\\'")}');" style="display:block;margin-top:8px;padding:4px 12px;background:transparent;border:1px solid rgba(200,50,50,0.3);color:rgba(200,50,50,0.6);font-family:var(--fu);font-size:10px;letter-spacing:.08em;cursor:pointer;transition:all .3s;" onmouseenter="this.style.background='rgba(200,50,50,0.15)';this.style.color='#c03232'" onmouseleave="this.style.background='transparent';this.style.color='rgba(200,50,50,0.6)'">Deletar</button>
            </td>
          </tr>
        `;
      }

      return `
        <tr>
          <td>
            <div class="td-name">${g.nome || '—'}</div>
            ${compHTML}
          </td>
          <td>${g.whatsapp || '—'}</td>
          <td>${g.interesse || '—'}</td>
          <td>${g.acompanhantes != null ? g.acompanhantes : (comps.length || '0')}</td>
          <td><span class="fonte-tag">${g.fonte || '—'}</span></td>
          <td>${badgeHTML(g.status)}</td>
          <td>${formatDate(g.created_at)}</td>
          <td>
            <button onclick="copyLink('${g.id}','${(g.nome||'').replace(/'/g,"\\'")}',this)" style="display:block;margin-bottom:6px;padding:4px 12px;background:transparent;border:1px solid var(--gold-border);color:var(--gold);font-family:var(--fu);font-size:10px;letter-spacing:.06em;cursor:pointer;transition:all .3s;white-space:nowrap;" onmouseenter="this.style.background='rgba(212,175,55,0.12)'" onmouseleave="this.style.background='transparent'">Copiar Link</button>
            <select class="status-select" onchange="updateStatus('${g.id}', this.value)">
              ${selectOptions}
            </select>
            <button onclick="deleteGuest('${g.id}', '${(g.nome||'').replace(/'/g,"\\'")}');" style="display:block;margin-top:8px;padding:4px 12px;background:transparent;border:1px solid rgba(200,50,50,0.3);color:rgba(200,50,50,0.6);font-family:var(--fu);font-size:10px;letter-spacing:.08em;cursor:pointer;transition:all .3s;" onmouseenter="this.style.background='rgba(200,50,50,0.15)';this.style.color='#c03232'" onmouseleave="this.style.background='transparent';this.style.color='rgba(200,50,50,0.6)'">Deletar</button>
            ${restricoes}
            ${mensagem}
          </td>
        </tr>
      `;
    }).join('');

    const tableHeaders = isCha
      ? '<th>Nome</th><th>WhatsApp</th><th>Presente</th><th>Prato</th><th>Status</th><th>Data</th><th>Ações</th>'
      : '<th>Nome</th><th>WhatsApp</th><th>Interesse</th><th>Acomp.</th><th>Fonte</th><th>Status</th><th>Data</th><th>Ações</th>';

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            ${tableHeaders}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  async function renderGuests() {
    document.getElementById('table-container').innerHTML = '<div class="state-msg">Carregando...</div>';
    try {
      allGuests = await loadGuests();
      if (!Array.isArray(allGuests)) {
        console.error('Resposta inesperada:', allGuests);
        allGuests = [];
        document.getElementById('table-container').innerHTML = '<div class="state-msg">Erro ao carregar dados. Verifique as credenciais do Supabase.</div>';
        return;
      }
      drawTable();
    } catch(err) {
      console.error('Erro ao carregar convidados:', err);
      document.getElementById('table-container').innerHTML = '<div class="state-msg">Erro de conexão com o Supabase.</div>';
    }
  }

  // ── KANBAN MESAS ──
  const MESAS_KEY = 'md_mesas_layout';

  // Initial mesa layout — organized by family/affinity, ~8 people each
  const INITIAL_MESAS = {
    "Mesa 1": [
      "61277f24-4e5c-47fe-be38-66dbd70d4cae", // Bruno Bessa (3p)
      "e23460e4-a35f-4e03-a963-0238f703ce68", // Luciana (2p)
      "39a49d53-1e1c-4e2e-a70b-eb1ac74278c4", // Patrícia (2p)
      "37d51269-66e8-4442-99e1-ad368c704794"  // Rafael Reis (2p)
    ],
    "Mesa 2": [
      "d82533f2-807d-4c1a-b9d5-60483d89f4bd", // Márcia B Oliveira (5p)
      "36886148-7189-4042-a798-f8b8299cf452", // Vanderlei (2p)
      "6d37d562-c1db-480a-8210-005ecbe7fee1", // Ricardo (1p)
      "0cc79b33-bf9b-4e27-8d6b-b89ede711dbd"  // Sandra (1p)
    ],
    "Mesa 3": [
      "69f965b6-5526-452c-b920-64295a15f832", // Rafael Dias Oliveira (4p)
      "cbab5c36-7d50-40de-9d70-03f44e9b2328", // Luzia (1p)
      "c539fced-1f6a-4ef1-b2f2-efbff2026eb5"  // Josenita (1p)
    ],
    "Mesa 4": [
      "22cafe90-38fb-4459-be00-961c1a75296b", // Aline Santos Rodrigues (5p)
      "268e95b2-0b1f-4f70-af6e-d44100d572f2"  // Mariana Barbosa Rodrigues (3p)
    ],
    "Mesa 5": [
      "33353c5b-a38e-4cb8-9a62-a48247accdf6", // Giovanna (2p)
      "d5c15484-2952-4762-a831-98e907e93066", // Giovanna dup (1p)
      "f47476ef-bf3a-4993-b574-99e90b374aef"  // Michelle Rodrigues Amorim (4p)
    ],
    "Mesa 6": [
      "f0b29975-3d9d-45da-a275-775cb8675e60", // Viviane Marques Rodrigues (5p)
      "24d3e592-97dd-41d3-8e26-c99d1665d156"  // Brigham Garcia (3p)
    ],
    "Mesa 7": [
      "151ff4ac-8b9e-4701-a562-decbb597addb", // Cleonice Barroso (4p)
      "ee112924-015c-44cf-948a-a9b92ea27f43", // Danielle Amorim Lima (3p)
      "2b218823-da75-491b-a263-816ac5ffc25d"  // Daniela Sousa (2p)
    ],
    "Mesa 8": [
      "4d5bbb18-d1ee-4d51-83a8-6bdf93fee913", // Matheus Rosa (2p) - padrinho
      "69df4382-2d3b-4baa-b49f-554a805d8880", // Arthur Leandro (2p) - padrinho
      "1416e35c-e414-4d74-8e86-ee2348ea355c", // Fellipe Augusto (1p) - padrinho
      "8a3e3c05-95e7-4a77-9c95-b311684990c2", // Letícya Arantes (2p) - madrinha
      "04f3d89e-6333-41ea-8957-1c933c201d7a"  // Maria Julia Barroso (2p) - madrinha
    ]
  };

  function loadMesasLayout() {
    try {
      const saved = JSON.parse(localStorage.getItem(MESAS_KEY));
      if (saved && Object.keys(saved).length > 0) return saved;
      // First time: use initial layout
      saveMesasLayout(INITIAL_MESAS);
      return INITIAL_MESAS;
    } catch(e) {
      saveMesasLayout(INITIAL_MESAS);
      return INITIAL_MESAS;
    }
  }
  function saveMesasLayout(layout) {
    localStorage.setItem(MESAS_KEY, JSON.stringify(layout));
  }

  function getConfirmedGuests() {
    return allGuests.filter(g =>
      g.status === 'confirmado' && !(g.mensagem && g.mensagem.includes('[CHA-COZINHA]'))
    );
  }

  function drawKanban() {
    const board = document.getElementById('kanban-board');
    const confirmed = getConfirmedGuests();
    const layout = loadMesasLayout();

    // layout = { "Mesa 1": ["guest-id-1", "guest-id-2"], "Mesa 2": [...] }
    const mesaNames = Object.keys(layout).sort((a,b) => {
      const na = parseInt(a.replace(/\D/g,'')) || 0;
      const nb = parseInt(b.replace(/\D/g,'')) || 0;
      return na - nb;
    });

    // Find unassigned guests
    const assignedIds = new Set();
    mesaNames.forEach(m => (layout[m] || []).forEach(id => assignedIds.add(id)));
    const unassigned = confirmed.filter(g => !assignedIds.has(g.id));

    // Count people per mesa
    function countMesaPeople(guestIds) {
      let total = 0;
      guestIds.forEach(id => {
        const g = confirmed.find(x => x.id === id);
        if (!g) return;
        total += 1;
        const comps = Array.isArray(g.wedding_companions) ? g.wedding_companions.length : 0;
        total += comps;
      });
      return total;
    }

    function guestCard(g) {
      const comps = Array.isArray(g.wedding_companions) ? g.wedding_companions : [];
      const compHTML = comps.map(c => `<div>${c.nome}${c.idade ? ', ' + c.idade : ''}</div>`).join('');
      const totalPeople = 1 + comps.length;
      return `
        <div class="kanban-card" draggable="true" data-guest-id="${g.id}">
          <div class="kanban-card-name">${g.nome || '—'} <span style="font-family:var(--fu);font-size:10px;opacity:.35;">(${totalPeople})</span></div>
          ${compHTML ? `<div class="kanban-card-comp">${compHTML}</div>` : ''}
          <div class="kanban-card-fonte">${g.fonte || ''}</div>
        </div>
      `;
    }

    function mesaColumn(name, guestIds, isUnassigned) {
      const guests = guestIds.map(id => confirmed.find(g => g.id === id)).filter(Boolean);
      const people = countMesaPeople(guestIds);
      return `
        <div class="kanban-col ${isUnassigned ? 'kanban-col--unassigned' : ''}" data-mesa="${name}">
          <div class="kanban-col-header">
            <span class="kanban-col-title">${name}</span>
            <span class="kanban-col-count">${people} pessoas</span>
          </div>
          <div class="kanban-col-body" data-mesa-drop="${name}">
            ${guests.map(g => guestCard(g)).join('')}
          </div>
          ${!isUnassigned ? `
            <div class="kanban-col-actions">
              <button onclick="renameMesa('${name.replace(/'/g,"\\'")}')">Renomear</button>
              <button class="btn-del" onclick="deleteMesa('${name.replace(/'/g,"\\'")}')">Remover</button>
            </div>
          ` : ''}
        </div>
      `;
    }

    let html = mesaColumn('Sem Mesa', unassigned.map(g => g.id), true);
    mesaNames.forEach(name => {
      html += mesaColumn(name, layout[name] || [], false);
    });

    board.innerHTML = html;

    // Stats
    const totalPeople = confirmed.reduce((sum, g) => {
      return sum + 1 + (Array.isArray(g.wedding_companions) ? g.wedding_companions.length : 0);
    }, 0);
    const assignedPeople = mesaNames.reduce((sum, m) => sum + countMesaPeople(layout[m] || []), 0);
    document.getElementById('mesa-stats').textContent =
      `${confirmed.length} confirmados · ${totalPeople} pessoas · ${mesaNames.length} mesas · ${totalPeople - assignedPeople} sem mesa`;

    // Drag and drop
    initDragDrop();
  }

  function initDragDrop() {
    let draggedId = null;

    document.querySelectorAll('.kanban-card').forEach(card => {
      card.addEventListener('dragstart', e => {
        draggedId = card.dataset.guestId;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        document.querySelectorAll('.kanban-col-body').forEach(b => b.classList.remove('drag-over'));
      });
    });

    document.querySelectorAll('.kanban-col-body').forEach(dropZone => {
      dropZone.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        dropZone.classList.add('drag-over');
      });
      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
      });
      dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        if (!draggedId) return;

        const targetMesa = dropZone.dataset.mesaDrop;
        const layout = loadMesasLayout();

        // Remove from all mesas
        Object.keys(layout).forEach(m => {
          layout[m] = (layout[m] || []).filter(id => id !== draggedId);
        });

        // Add to target (if not "Sem Mesa")
        if (targetMesa !== 'Sem Mesa') {
          if (!layout[targetMesa]) layout[targetMesa] = [];
          layout[targetMesa].push(draggedId);
        }

        // Clean empty
        Object.keys(layout).forEach(m => { if (!layout[m].length) delete layout[m]; });

        saveMesasLayout(layout);
        drawKanban();
        draggedId = null;
      });
    });
  }

  function addMesa() {
    const layout = loadMesasLayout();
    const existing = Object.keys(layout).length;
    const name = prompt('Nome da mesa:', 'Mesa ' + (existing + 1));
    if (!name || !name.trim()) return;
    layout[name.trim()] = [];
    saveMesasLayout(layout);
    drawKanban();
  }

  function renameMesa(oldName) {
    const newName = prompt('Novo nome:', oldName);
    if (!newName || !newName.trim() || newName.trim() === oldName) return;
    const layout = loadMesasLayout();
    layout[newName.trim()] = layout[oldName] || [];
    delete layout[oldName];
    saveMesasLayout(layout);
    drawKanban();
  }

  function deleteMesa(name) {
    if (!confirm('Remover "' + name + '"? Os convidados voltarão para "Sem Mesa".')) return;
    const layout = loadMesasLayout();
    delete layout[name];
    saveMesasLayout(layout);
    drawKanban();
  }

  function saveMesas() {
    alert('Layout salvo no navegador. As mesas serão mantidas ao recarregar.');
  }

  function resetMesas() {
    if (!confirm('Resetar todas as mesas? Todos os convidados voltarão para "Sem Mesa".')) return;
    localStorage.removeItem(MESAS_KEY);
    drawKanban();
  }

  // Init
  renderGuests();
</script>
