<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Arte WhatsApp 3 — Burgundy Bold</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,100..900,0..100,0..1;1,9..144,100..900,0..100,0..1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{width:1080px;height:1350px;overflow:hidden;background:#F5F0EB;font-family:'Inter',sans-serif;margin:0}
    .card{width:1080px;height:1350px;background:#F5F0EB;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:100px 110px 80px}

    /* Rounded hand-drawn border like ref 2 */
    .border-frame{position:absolute;inset:30px;pointer-events:none}
    .border-frame svg{width:100%;height:100%}

    .top{display:flex;flex-direction:column;align-items:center;gap:6px;z-index:2}
    .label{font-size:16px;font-weight:400;letter-spacing:.22em;text-transform:uppercase;color:#6B5B4E;opacity:.55}
    .title-line1{font-family:'Fraunces',serif;font-weight:300;font-size:72px;line-height:1;color:#7A2E3A;font-variation-settings:"opsz" 144,"SOFT" 50,"WONK" 1;font-style:italic}
    .title-big{font-family:'Fraunces',serif;font-weight:400;font-size:130px;line-height:.85;color:#7A2E3A;font-variation-settings:"opsz" 144,"SOFT" 40,"WONK" 1;font-style:italic}
    .names{font-family:'Fraunces',serif;font-weight:300;font-size:28px;color:#6B5B4E;font-variation-settings:"opsz" 72,"SOFT" 25;letter-spacing:.06em;margin-top:4px}
    .names em{font-style:italic;opacity:.4;font-size:.75em;padding:0 6px}

    .mid{z-index:2;display:flex;flex-direction:column;align-items:center;gap:32px;flex:1;justify-content:center}

    .date-hero{display:flex;align-items:center;justify-content:center;gap:20px}
    .date-hero-num{font-family:'Fraunces',serif;font-weight:300;font-size:180px;line-height:1;color:#7A2E3A;font-variation-settings:"opsz" 144,"SOFT" 10}
    .date-hero-slash{font-family:'Fraunces',serif;font-weight:200;font-size:120px;color:#7A2E3A;opacity:.2;font-variation-settings:"opsz" 144}
    .date-hero-month{font-family:'Fraunces',serif;font-weight:300;font-size:180px;line-height:1;color:#7A2E3A;font-variation-settings:"opsz" 144,"SOFT" 10}

    .date-details{display:flex;align-items:center;gap:40px}
    .detail-item{text-align:center}
    .detail-label{font-size:12px;font-weight:400;letter-spacing:.2em;text-transform:uppercase;color:#8B7D6B;opacity:.5;margin-bottom:4px}
    .detail-val{font-family:'Fraunces',serif;font-weight:300;font-size:26px;color:#6B5B4E;font-variation-settings:"opsz" 72,"SOFT" 20}
    .detail-sep{width:1px;height:40px;background:#7A2E3A;opacity:.1}

    .bot{display:flex;flex-direction:column;align-items:center;gap:18px;z-index:2}
    .orn-row{display:flex;align-items:center;gap:12px}
    .orn-line{width:45px;height:1px;background:#7A2E3A;opacity:.15}
    .orn-dia{width:5px;height:5px;border:1px solid #7A2E3A;opacity:.2;transform:rotate(45deg)}
    .loc{font-size:20px;font-weight:300;color:#6B5B4E;opacity:.55;text-align:center;line-height:1.7}
    .divline{width:50px;height:1px;background:#7A2E3A;opacity:.15}
    .link-hint{font-size:16px;font-weight:300;color:#7A2E3A;opacity:.45;letter-spacing:.03em}
    .link-url{font-size:20px;font-weight:400;color:#7A2E3A;opacity:.75;letter-spacing:.02em}
  </style>
</head>
<body>
<div class="card">

  <!-- Rounded hand-drawn border -->
  <div class="border-frame">
    <svg viewBox="0 0 1020 1290" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="
        M80 25 C160 18,260 32,360 24 C460 16,540 32,640 24 C740 16,840 30,940 25
        C960 30,975 45,980 80
        C986 180,974 280,982 380 C990 480,974 580,982 680 C990 780,974 880,982 980
        C978 1000,975 1020,980 1060
        C975 1075,960 1085,940 1270
        C840 1278,740 1264,640 1272 C540 1280,460 1264,360 1272 C260 1280,160 1264,80 1270
        C60 1268,45 1258,40 1240
        C34 1140,46 1040,38 940 C30 840,46 740,38 640 C30 540,46 440,38 340 C30 240,46 140,40 80
        C45 50,60 32,80 25Z
      " stroke="#8B7D6B" stroke-width="2.5" stroke-linecap="round" fill="none" opacity=".22"/>
    </svg>
  </div>

  <div class="top">
    <!-- Bow -->
    <svg width="80" height="40" viewBox="0 0 120 60" fill="none" style="margin-bottom:8px">
      <path d="M60 30 C50 12,22 6,12 18 C6 28,16 38,30 34 C42 31,55 30,60 30Z" stroke="#6B5B4E" stroke-width="2" fill="none" opacity=".4"/>
      <path d="M60 30 C70 12,98 6,108 18 C114 28,104 38,90 34 C78 31,65 30,60 30Z" stroke="#6B5B4E" stroke-width="2" fill="none" opacity=".4"/>
      <path d="M56 30 C56 36,53 46,50 54" stroke="#6B5B4E" stroke-width="1.5" fill="none" opacity=".3"/>
      <path d="M64 30 C64 36,67 46,70 54" stroke="#6B5B4E" stroke-width="1.5" fill="none" opacity=".3"/>
    </svg>
    <span class="label">Vocês estão convidados</span>
    <span class="title-line1">Chá de</span>
    <span class="title-big">Casa Nova</span>
    <p class="names">Moroni <em>&</em> Daphine</p>
  </div>

  <div class="mid">
    <!-- Big date -->
    <div class="date-hero">
      <span class="date-hero-num">06</span>
      <span class="date-hero-slash">/</span>
      <span class="date-hero-month">06</span>
    </div>

    <div class="date-details">
      <div class="detail-item">
        <p class="detail-label">Dia</p>
        <p class="detail-val">Sábado</p>
      </div>
      <span class="detail-sep"></span>
      <div class="detail-item">
        <p class="detail-label">Horário</p>
        <p class="detail-val">19h</p>
      </div>
      <span class="detail-sep"></span>
      <div class="detail-item">
        <p class="detail-label">Ano</p>
        <p class="detail-val">2026</p>
      </div>
    </div>

    <!-- Small kitchen illustration -->
    <svg width="280" height="120" viewBox="0 0 280 120" fill="none" style="margin-top:8px">
      <!-- Rolling pin -->
      <line x1="20" y1="60" x2="100" y2="60" stroke="#8B7D6B" stroke-width="2" stroke-linecap="round" opacity=".3"/>
      <rect x="35" y="50" width="50" height="20" rx="10" stroke="#8B7D6B" stroke-width="1.5" fill="none" opacity=".3"/>
      <!-- Whisk -->
      <line x1="140" y1="25" x2="140" y2="55" stroke="#8B7D6B" stroke-width="1.5" opacity=".3"/>
      <path d="M132 55 C130 75,134 90,140 95 C146 90,150 75,148 55" stroke="#8B7D6B" stroke-width="1.5" fill="none" opacity=".3"/>
      <path d="M135 55 C134 72,137 85,140 90 C143 85,146 72,145 55" stroke="#8B7D6B" stroke-width="1" fill="none" opacity=".2"/>
      <!-- Heart -->
      <path d="M140 108 C136 104,128 98,128 92 C128 88,131 86,134 86 C136 86,138 87,140 89 C142 87,144 86,146 86 C149 86,152 88,152 92 C152 98,144 104,140 108Z" stroke="#7A2E3A" stroke-width="1.2" fill="none" opacity=".35"/>
      <!-- Spatula -->
      <line x1="200" y1="30" x2="200" y2="65" stroke="#8B7D6B" stroke-width="1.5" opacity=".3"/>
      <rect x="192" y="65" width="16" height="30" rx="3" stroke="#8B7D6B" stroke-width="1.5" fill="none" opacity=".3"/>
      <!-- Mixer bowl -->
      <path d="M230 55 C232 40,250 35,268 40 C278 43,280 55,278 65 L270 80 C265 85,245 88,240 85 L232 70 C230 65,229 60,230 55Z" stroke="#8B7D6B" stroke-width="1.5" fill="none" opacity=".3"/>
      <ellipse cx="255" cy="52" rx="22" ry="8" stroke="#8B7D6B" stroke-width="1" fill="none" opacity=".15"/>
    </svg>
  </div>

  <div class="bot">
    <div class="orn-row">
      <span class="orn-line"></span>
      <span class="orn-dia"></span>
      <span class="orn-line"></span>
    </div>
    <p class="loc">Capela Faustino Augusto Cesar 81<br>Igreja de Jesus Cristo dos Santos dos Últimos Dias</p>
    <div class="divline"></div>
    <span class="link-hint">Confirme e veja a lista de presentes</span>
    <span class="link-url">moroniedaphine.vercel.app/cha-de-cozinha</span>
  </div>

</div>
</body>
</html>
