<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200">
  <!-- Variation E — Monogram + Full Name: GP monogram with full name beside it -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&amp;display=swap');
    </style>
  </defs>
  <!-- Monogram circle -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#DBA99F" stroke-width="1"/>
  <!-- GP Monogram -->
  <text x="100" y="90" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="300" font-size="42" fill="#2C2C2C" text-anchor="middle">G</text>
  <text x="100" y="130" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="400" font-size="32" fill="#DBA99F" text-anchor="middle">P</text>
  <!-- Separator -->
  <line x1="180" y1="50" x2="180" y2="150" stroke="#DBA99F" stroke-width="0.5" opacity="0.5"/>
  <!-- Full name -->
  <text x="420" y="85" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="300" font-size="48" fill="#2C2C2C" text-anchor="middle" letter-spacing="6">GIOVANNA</text>
  <text x="420" y="135" font-family="'Cormorant Garamond', 'Georgia', serif" font-weight="400" font-size="30" fill="#9C958F" text-anchor="middle" letter-spacing="12">PAOLA</text>
</svg>