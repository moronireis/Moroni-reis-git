<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px;
    height: 1080px;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: 168px;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 36px;
  }
  .rule {
    width: 500px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  }
  .sub {
    font-family: 'Montserrat', sans-serif;
    font-weight: 200;
    font-size: 42px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-top: 36px;
  }
</style>
</head>
<body>
  <div class="name">Giovanna Paola</div>
  <div class="rule"></div>
  <div class="sub">Produção de Eventos</div>
</body>
</html>
