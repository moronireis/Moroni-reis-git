<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160">
  <!-- Variation 1: Refinamento Clássico — refined horizontal bars with modern proportions -->

  <!-- Left decorative bars -->
  <rect x="48" y="38" width="28" height="3" rx="1.5" fill="#3CBCB4"/>
  <rect x="40" y="48" width="36" height="3" rx="1.5" fill="#3CBCB4"/>
  <rect x="48" y="58" width="28" height="3" rx="1.5" fill="#3CBCB4"/>

  <!-- GJ Letterforms -->
  <text x="160" y="72" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="600" letter-spacing="8" fill="currentColor">
    <tspan>G</tspan>
    <tspan dx="4" fill="#3CBCB4">J</tspan>
  </text>

  <!-- Right decorative bars -->
  <rect x="244" y="38" width="28" height="3" rx="1.5" fill="#3CBCB4"/>
  <rect x="244" y="48" width="36" height="3" rx="1.5" fill="#3CBCB4"/>
  <rect x="244" y="58" width="28" height="3" rx="1.5" fill="#3CBCB4"/>

  <!-- EVENTOS subtitle -->
  <text x="160" y="100" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="300" letter-spacing="10" fill="currentColor" opacity="0.5">EVENTOS</text>

  <!-- Thin accent line below -->
  <line x1="110" y1="114" x2="210" y2="114" stroke="#3CBCB4" stroke-width="1" stroke-linecap="round"/>
</svg>