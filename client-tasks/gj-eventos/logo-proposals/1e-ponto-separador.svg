<?xml version="1.0" encoding="UTF-8"?>
<!-- GJ Eventos — Variation 1E: Com Ponto Separador -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 130">
  <!-- Left decorative bars -->
  <rect x="44" y="34" width="26" height="3" rx="1.5" fill="#2EB8A6"/>
  <rect x="38" y="44" width="32" height="3" rx="1.5" fill="#2EB8A6"/>
  <rect x="44" y="54" width="26" height="3" rx="1.5" fill="#2EB8A6"/>

  <!-- G letterform -->
  <text x="138" y="70" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="600" fill="currentColor">G</text>

  <!-- Teal dot separator -->
  <circle cx="162" cy="55" r="3.5" fill="#2EB8A6"/>

  <!-- J letterform -->
  <text x="186" y="70" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="600" fill="currentColor">J</text>

  <!-- Right decorative bars -->
  <rect x="250" y="34" width="26" height="3" rx="1.5" fill="#2EB8A6"/>
  <rect x="250" y="44" width="32" height="3" rx="1.5" fill="#2EB8A6"/>
  <rect x="250" y="54" width="26" height="3" rx="1.5" fill="#2EB8A6"/>

  <!-- EVENTOS subtitle -->
  <text x="160" y="98" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="10" fill="currentColor" opacity="0.5">EVENTOS</text>
</svg>
