confidence:
  overall: medium-high
  breakdown:
    brand_colors: medium
    note_colors: "Purple Spirit is confirmed as brand color; exact hex (#6B2D8B) is industry-consensus approximation — official hex may vary slightly"
    typography: high
    note_typography: "Riviera Nights confirmed by multiple sources as replacement for Gill Sans. Characteristics (bevelled, light, wide) confirmed. Exact weight/size scale is inferred from luxury automotive digital conventions"
    spacing: medium
    note_spacing: "Scale derived from luxury automotive conventions and observed patterns. 8px base unit is standard."
    motion: medium
    note_motion: "Easing curves and durations are architectural decisions aligned with brand philosophy. Exact values inferred from luxury digital best practices."
    components: medium-high
    note_components: "Component patterns (outlined buttons, sharp corners, frosted nav) observed in cached screenshots and consistent with AKQA's luxury automotive work"
    photography: high
    note_photography: "Photography direction is extensively documented in press coverage and visible in all public-facing Rolls-Royce materials"

  tokens_by_confidence:
    high:
      - "typography.families.primary (Riviera Nights confirmed)"
      - "colors.brand.purple-spirit (brand color confirmed)"
      - "colors.neutrals.black (dark mode native confirmed)"
      - "photography direction (widely documented)"
      - "anti-patterns (observable from public site)"
    medium:
      - "exact hex values for Purple Spirit, Charles Blue"
      - "typography size scale"
      - "spacing scale values"
      - "component dimensions"
      - "motion timing and easing"
    low:
      - "z-index scale (standard assumption)"
      - "specific breakpoint values"
      - "shadow values"

deliverables:
  - file: DESIGN.md
    sections: 12
    tokens: 120+
  - file: tokens.json
    format: structured JSON with meta, colors, typography, spacing, layout, borders, shadows, motion, components, z-index
  - file: preview.html
    features: "standalone single-file, embedded fonts (Playfair Display as Riviera Nights proxy), interactive color swatches, typography specimens, spacing scale, component demos, motion easing previews, responsive, print-friendly"
  - file: extraction-log.yaml
    purpose: "provenance, confidence tracking, source documentation"

extractor: "REIS [IA] design-system-extractor agent"
purpose: "Protocolo Luxo knowledge base — consumed by art-director, designer-agent, typography-specialist, visual-qa-agent"
